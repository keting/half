name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            src/backend/requirements.txt
            src/backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Compose interpolation requires these variables to exist during CI.
      # They are placeholders for validation and image build only.
      HALF_ADMIN_PASSWORD: ValidPass123
      HALF_SECRET_KEY: ci-placeholder-secret-key-with-minimum-length
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker compose file
        run: docker compose -f docker-compose.yml config

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build
