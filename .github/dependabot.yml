version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/src/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "area:backend"
    ignore:
      # bcrypt is intentionally pinned in requirements.txt; skip routine version
      # bumps but still receive security updates (security PRs are a separate
      # update category and are not blocked by version-update ignore rules).
      - dependency-name: "bcrypt"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: "npm"
    directory: "/src/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "area:frontend"

  - package-ecosystem: "docker"
    directory: "/src/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "area:backend"

  - package-ecosystem: "docker"
    directory: "/src/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "area:frontend"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "area:ci"
