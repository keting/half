services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HALF_ADMIN_PASSWORD=${HALF_ADMIN_PASSWORD:-example-insecure-password-placeholder}
      - HALF_SECRET_KEY=${HALF_SECRET_KEY:-example-insecure-secret-placeholder}
      - HALF_ALLOW_REGISTER=${HALF_ALLOW_REGISTER:-true}
      - HALF_WORKSPACE_ROOT=/workspace
    volumes:
      - backend-data:/app/data
      - backend-repos:/app/repos
      - ..:/workspace
      - ${HOME}/.ssh:/ssh-host:ro
    command: >-
      sh -lc 'rm -rf /root/.ssh &&
      mkdir -p /root/.ssh &&
      cp -R /ssh-host/. /root/.ssh/ &&
      chown -R root:root /root/.ssh &&
      chmod 700 /root/.ssh &&
      find /root/.ssh -type f -exec chmod 600 {} \; &&
      uvicorn main:app --host 0.0.0.0 --port 8000'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-repos:
